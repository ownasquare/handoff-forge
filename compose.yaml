services:
  handoff-forge:
    build: .
    ports:
      - "127.0.0.1:8517:8517"
    environment:
      HANDOFF_FORGE_DATA_DIR: /data
      HANDOFF_FORGE_OFFLINE: "true"
      HANDOFF_FORGE_ALLOW_NETWORK: "false"
    volumes:
      - handoff-forge-data:/data
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  handoff-forge-data:
