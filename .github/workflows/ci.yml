name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          python-version: "3.11"
      - run: uv lock --check
      - run: uv sync --frozen
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy src
      - run: uv run pytest tests/unit tests/integration tests/contract tests/ui --disable-socket --cov=handoff_forge --cov-branch
      - run: uv run bandit -q -r src
      - run: uv run pip-audit
      - run: uv run python scripts/check_public_repo.py
      - run: uv build
      - name: Write release artifact checksums
        working-directory: dist
        run: |
          sha256sum *.whl *.tar.gz > SHA256SUMS
          sha256sum --check SHA256SUMS
      - name: Upload release artifact proof
        uses: actions/upload-artifact@v7
        with:
          name: handoff-forge-ci-release-dist
          path: dist
          if-no-files-found: error
      - name: Download release artifact proof
        uses: actions/download-artifact@v8
        with:
          name: handoff-forge-ci-release-dist
          path: ${{ runner.temp }}/handoff-forge-ci-release-dist
      - name: Verify downloaded release artifacts
        working-directory: ${{ runner.temp }}/handoff-forge-ci-release-dist
        run: sha256sum --check SHA256SUMS
      - name: Smoke the built wheel in an isolated environment
        run: |
          uv venv "$RUNNER_TEMP/handoff-forge-wheel"
          uv pip install --python "$RUNNER_TEMP/handoff-forge-wheel/bin/python" dist/*.whl
          "$RUNNER_TEMP/handoff-forge-wheel/bin/handoff-forge" --version
          "$RUNNER_TEMP/handoff-forge-wheel/bin/handoff-forge" --data-root "$RUNNER_TEMP/handoff-forge-data" doctor --json
          "$RUNNER_TEMP/handoff-forge-wheel/bin/handoff-forge" --data-root "$RUNNER_TEMP/handoff-forge-data" demo --json

  compatibility:
    name: ${{ matrix.os }} · Python ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.13"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - run: uv sync --frozen
      - run: uv run pytest tests/unit tests/contract -q
      - run: uv run handoff-forge --data-root "${{ runner.temp }}/handoff-forge-compat" doctor --json
      - run: uv run handoff-forge --data-root "${{ runner.temp }}/handoff-forge-compat" demo --json

  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.11"
      - run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
      - run: uv sync --frozen
      - run: uv run playwright install --with-deps chromium
      - name: Start isolated Streamlit server
        run: |
          HANDOFF_FORGE_DATA_DIR="$RUNNER_TEMP/handoff-forge-browser-data" uv run handoff-forge ui --host 127.0.0.1 --port 8517 >"$RUNNER_TEMP/handoff-forge-streamlit.log" 2>&1 &
          echo $! >"$RUNNER_TEMP/handoff-forge-streamlit.pid"
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:8517/_stcore/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat "$RUNNER_TEMP/handoff-forge-streamlit.log"
          exit 1
      - name: Run rendered browser workflows
        env:
          HANDOFF_FORGE_RUN_E2E: "1"
          HANDOFF_FORGE_E2E_URL: http://127.0.0.1:8517
          HANDOFF_FORGE_E2E_ARTIFACT_DIR: ${{ runner.temp }}/handoff-forge-browser-proof
        run: uv run pytest tests/e2e -m e2e -q
      - name: Upload browser proof
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: handoff-forge-browser-proof
          path: |
            ${{ runner.temp }}/handoff-forge-browser-proof
            ${{ runner.temp }}/handoff-forge-streamlit.log
      - name: Stop isolated Streamlit server
        if: always()
        run: |
          if test -f "$RUNNER_TEMP/handoff-forge-streamlit.pid"; then
            kill "$(cat "$RUNNER_TEMP/handoff-forge-streamlit.pid")" || true
          fi
