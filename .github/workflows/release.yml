name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.11"
      - run: uv sync --frozen
      - name: Verify tag and package version
        run: uv run python scripts/verify_release_tag.py "$GITHUB_REF_NAME"
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy src
      - run: uv run pytest tests/unit tests/integration tests/contract tests/ui --disable-socket --cov=handoff_forge --cov-branch
      - run: uv run bandit -q -r src
      - run: uv run pip-audit
      - run: uv run python scripts/check_public_repo.py

  compatibility:
    needs: verify
    name: ${{ matrix.os }} · Python ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.13"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - run: uv sync --frozen
      - run: uv run pytest tests/unit tests/contract -q
      - run: uv run handoff-forge --data-root "${{ runner.temp }}/handoff-forge-compat" doctor --json
      - run: uv run handoff-forge --data-root "${{ runner.temp }}/handoff-forge-compat" demo --json

  browser:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
      - run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
      - run: uv sync --frozen
      - run: uv run playwright install --with-deps chromium
      - name: Start isolated Streamlit server
        run: |
          HANDOFF_FORGE_DATA_DIR="$RUNNER_TEMP/handoff-forge-browser-data" uv run handoff-forge ui --host 127.0.0.1 --port 8517 >"$RUNNER_TEMP/handoff-forge-streamlit.log" 2>&1 &
          echo $! >"$RUNNER_TEMP/handoff-forge-streamlit.pid"
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:8517/_stcore/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat "$RUNNER_TEMP/handoff-forge-streamlit.log"
          exit 1
      - name: Run rendered browser workflows
        env:
          HANDOFF_FORGE_RUN_E2E: "1"
          HANDOFF_FORGE_E2E_URL: http://127.0.0.1:8517
          HANDOFF_FORGE_E2E_ARTIFACT_DIR: ${{ runner.temp }}/handoff-forge-browser-proof
        run: uv run pytest tests/e2e -m e2e -q
      - name: Upload browser proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: handoff-forge-release-browser-proof
          path: |
            ${{ runner.temp }}/handoff-forge-browser-proof
            ${{ runner.temp }}/handoff-forge-streamlit.log
      - name: Stop isolated Streamlit server
        if: always()
        run: |
          if test -f "$RUNNER_TEMP/handoff-forge-streamlit.pid"; then
            kill "$(cat "$RUNNER_TEMP/handoff-forge-streamlit.pid")" || true
          fi

  build:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.11"
      - run: uv sync --frozen
      - run: uv build
      - name: Smoke release wheel
        run: |
          uv venv "$RUNNER_TEMP/handoff-forge-release"
          uv pip install --python "$RUNNER_TEMP/handoff-forge-release/bin/python" dist/*.whl
          "$RUNNER_TEMP/handoff-forge-release/bin/handoff-forge" --version
          "$RUNNER_TEMP/handoff-forge-release/bin/handoff-forge" --data-root "$RUNNER_TEMP/handoff-forge-release-data" doctor --json
          "$RUNNER_TEMP/handoff-forge-release/bin/handoff-forge" --data-root "$RUNNER_TEMP/handoff-forge-release-data" demo --json
      - name: Write and verify sibling artifact checksums
        working-directory: dist
        run: |
          sha256sum *.whl *.tar.gz > SHA256SUMS
          sha256sum --check SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: handoff-forge-release-dist
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS
          if-no-files-found: error

  release:
    needs: [build, compatibility, browser]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Require the tagged commit to be on main
        run: git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - uses: actions/download-artifact@v4
        with:
          name: handoff-forge-release-dist
          path: dist
      - name: Verify downloaded release assets
        working-directory: dist
        run: sha256sum --check SHA256SUMS
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/*.whl dist/*.tar.gz dist/SHA256SUMS --generate-notes --verify-tag
